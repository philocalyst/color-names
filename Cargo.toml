[package]
name = "colornames"
description = "Names for a large set of widely understood color sets, like HTML or xkcd"
license = "MIT"
version = "0.2.0"
edition = "2024"

[dependencies]
rgb = "0.8.50"
hex = "0.4.3"
color = "0.3.2"
serde = { version = "1.0.228", optional = true, features = ["derive"] }

[features]
default = ["basic"]
all = [
    "basic",
    "html", 
    "japanese-traditional",
    "le-corbusier",
    "nbs-iscc",
    "ntc",
    "osxcrayons",
    "ral",
    "ridgway",
    "sanzo-wada-i",
    "thesaurus",
    "werner",
    "windows",
    "wikipedia",
    "french",
    "complete",
    "short",
    "best-of",
    "spanish",
    "german",
    "x11",
    "xkcd",
    "risograph",
    "chinese-traditional",
    "hindi",
]
basic = []
serde = ["dep:serde"]
html = []
complete = []
short = []
best-of = []
japanese-traditional = []
le-corbusier = []
nbs-iscc = []
ntc = []
osxcrayons = []
ral = []
ridgway = []
sanzo-wada-i = []
thesaurus = []
werner = []
windows = []
wikipedia = []
french = []
spanish = []
german = []
x11 = []
xkcd = []
risograph = []
chinese-traditional = []
hindi = []

[build-dependencies]
num2words = "1.2.0"
csv = "1.3.1"
hex = "0.4.3"
heck = "0.5.0"
rgb = "0.8.50"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
quote = "1.0"
proc-macro2 = "1.0"
syn = "2.0"
